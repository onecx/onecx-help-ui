<!-- TOPBAR ITEM -->
<div *ocxIfPermission="'HELP#EDIT'; permissions: permissions">
  <!-- slot getting data from product store: one time only -->
  @if (pdIsComponentDefined$ | async) {
    <ocx-slot
      id="ocx_topbar_action_edit_help_item_slot_products"
      [name]="pdSlotName"
      [inputs]="{ dataType: 'products', logEnabled: false, logPrefix: 'help-editor' }"
      [outputs]="{ products: pdSlotEmitter }"
    >
    </ocx-slot>
  }
  <p-button
    id="ocx_topbar_action_edit_help_item"
    class="ocx-topbar-action"
    pRipple
    [rounded]="true"
    icon="pi pi-pencil"
    (click)="onEditHelpItem($event)"
    (keydown.enter)="onEditHelpItem($event)"
    [ariaLabel]="'HELP_ITEM_EDITOR.TOOLTIP' | translate"
    [pTooltip]="'HELP_ITEM_EDITOR.TOOLTIP' | translate"
    tooltipPosition="bottom"
    tooltipEvent="hover"
  />
</div>
