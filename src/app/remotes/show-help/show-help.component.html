<div
  class="relative flex align-items-center justify-content-center"
  *ocxIfPermission="'HELP#VIEW'; permissions: permissions"
>
  <p-button
    id="ocx_topbar_action_show_help_item"
    class="layout-topbar-action"
    pRipple
    [rounded]="true"
    icon="pi pi-question-circle"
    (click)="onOpenHelpPage($event)"
    (keydown.enter)="onOpenHelpPage($event)"
    [attr.aria-label]="'SHOW_HELP.LABEL' | translate"
    [pTooltip]="'SHOW_HELP.TOOLTIP' | translate"
    tooltipPosition="bottom"
    tooltipEvent="hover"
  />
</div>
