<!-- TOPBAR ITEM -->
<div *ocxIfPermission="'HELP#VIEW'; permissions: permissions">
  <p-button
    id="ocx_topbar_action_show_help_item"
    class="ocx-topbar-action"
    pRipple
    [rounded]="true"
    icon="pi pi-question-circle"
    (click)="onOpenHelpPage($event)"
    (keydown.enter)="onOpenHelpPage($event)"
    [ariaLabel]="'SHOW_HELP.LABEL' | translate"
    [pTooltip]="'SHOW_HELP.TOOLTIP' | translate"
    tooltipPosition="bottom"
    tooltipEvent="hover"
  />
</div>
