@if (visible) {
  <p-dialog
    [visible]="true"
    (visibleChange)="onCloseDialog()"
    [header]="'DIALOG.IMPORT.HEADER' | translate"
    [modal]="true"
    [closable]="true"
    [draggable]="true"
    [resizable]="true"
    [dismissableMask]="true"
    [style]="{ 'max-width': '550px' }"
  >
    <div class="flex flex-wrap flex-column row-gap-3">
      <p-fileUpload
        #fileUploader
        id="hm_import_file_upload"
        mode="advanced"
        name="file"
        accept=".json"
        [maxFileSize]="1000000"
        [customUpload]="true"
        (uploadHandler)="onImportConfirmation()"
        (onClear)="onImportClear()"
        (onRemove)="onImportClear()"
        (onSelect)="onImportSelectFile($event)"
        [showUploadButton]="importError() === 'NONE' && helpSnapshot !== null"
        [chooseLabel]="'DIALOG.IMPORT.CHOOSE' | translate"
        [uploadLabel]="'DIALOG.IMPORT.UPLOAD' | translate"
        [cancelLabel]="'ACTIONS.CANCEL' | translate"
      >
        <ng-template pTemplate="file" let-file let-i="index">
          <div class="p-fileupload-file">
            <div class="p-fileupload-file-info">
              <div class="p-fileupload-file-name">{{ file.name }}</div>
              <span class="p-fileupload-file-size">{{ formatUploadFileSize(file.size) }}</span>
            </div>
            <div class="p-fileupload-file-actions">
              <p-button
                (onClick)="fileUploader.remove($event, i)"
                [disabled]="fileUploader.uploading"
                text
                rounded
                severity="danger"
                styleClass="p-fileupload-file-remove-button"
              >
                <ng-template #icon>
                  <i class="pi pi-times"></i>
                </ng-template>
              </p-button>
            </div>
          </div>
        </ng-template>
      </p-fileUpload>
      @if (productNames.length > 0) {
        <div class="flex flex-column row-gap-1">
          <div>{{ 'DIALOG.IMPORT.PRODUCT.LIST' | translate }}</div>
          <p-listbox
            id="import_product_list"
            [options]="productNames"
            [filter]="false"
            [checkbox]="false"
            [multiple]="false"
            [metaKeySelection]="false"
            [showToggleAll]="false"
            [emptyMessage]="'ACTIONS.SEARCH.NO_DATA' | translate"
            [listStyle]="{ 'max-height': '100px' }"
            [ariaLabel]="'DIALOG.IMPORT.PRODUCT.LIST' | translate"
          />
        </div>
      }

      @if (importError() === 'NONE' && !helpSnapshot) {
        <p-message
          severity="info"
          id="th_import_name_hint_message"
          [text]="'DIALOG.IMPORT.MESSAGE.HINT' | translate"
        ></p-message>
      }
      @if (importError() === 'GENERAL') {
        <p-message
          id="hm_import_parse_error"
          severity="error"
          [text]="'VALIDATION.ERRORS.IMPORT_GENERAL_ERROR' | translate"
        ></p-message>
      }
      @if (importError() === 'CONTENT') {
        <p-message
          id="hm_import_content_error"
          severity="error"
          [text]="'VALIDATION.ERRORS.IMPORT_CONTENT_ERROR' | translate"
        ></p-message>
      }
    </div>
    <ng-template pTemplate="footer">
      <div class="flex flex-wrap justify-content-end column-gap-2 row-gap-1">
        <p-button
          id="hm_import_action_close"
          icon="pi pi-times"
          (onClick)="onCloseDialog()"
          [label]="'ACTIONS.NAVIGATION.CLOSE' | translate"
          [ariaLabel]="'ACTIONS.NAVIGATION.CLOSE' | translate"
          [pTooltip]="'ACTIONS.NAVIGATION.CLOSE.TOOLTIP' | translate"
          tooltipPosition="top"
          tooltipEvent="hover"
        ></p-button>
      </div>
    </ng-template>
  </p-dialog>
}
